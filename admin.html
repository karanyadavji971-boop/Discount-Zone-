<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin - Orders</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Roboto,sans-serif;background:#f0f4f0;color:#1a1a1a;padding:12px;}
        
        .header{background:#2e7d32;padding:10px 15px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;color:white;margin-bottom:12px;}
        .header h1{font-size:16px;}
        .header .logout-btn{background:#ff6b35;color:white;border:none;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:bold;}
        .header .back-btn{background:white;color:#2e7d32;border:none;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:bold;text-decoration:none;}
        .header .badge{background:#e74c3c;color:white;font-size:10px;padding:2px 8px;border-radius:20px;margin-left:6px;animation:blink 1s infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
        
        .login-box{max-width:320px;margin:60px auto;background:white;border-radius:16px;padding:25px 20px;text-align:center;}
        .login-box h2{font-size:18px;color:#2e7d32;}
        .login-box p{font-size:13px;color:#666;}
        .google-btn{background:white;border:1px solid #ddd;padding:10px;border-radius:30px;width:100%;cursor:pointer;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;}
        .login-error{color:#e74c3c;font-size:12px;margin-top:8px;display:none;}
        
        .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
        .stat-box{background:white;border-radius:10px;padding:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
        .stat-number{font-size:20px;font-weight:bold;color:#2e7d32;}
        .stat-label{font-size:10px;color:#666;}
        
        .tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
        .tab-btn{background:#f0f4f0;border:1px solid #2e7d32;padding:4px 10px;border-radius:20px;cursor:pointer;font-weight:bold;font-size:11px;}
        .tab-btn.active{background:#2e7d32;color:white;}
        
        .card{background:white;border-radius:12px;padding:10px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
        .order-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
        .order-id{font-weight:bold;font-size:12px;}
        .order-date{font-size:10px;color:#999;}
        .order-customer{font-size:12px;margin:4px 0;}
        .order-items{font-size:11px;color:#555;margin:4px 0;padding:4px 6px;background:#f8f9fa;border-radius:6px;max-height:50px;overflow-y:auto;}
        .order-total{font-weight:bold;color:#2e7d32;font-size:13px;}
        
        .status-select{padding:4px 8px;border-radius:15px;border:1px solid #ddd;font-size:10px;cursor:pointer;}
        .status-pending{background:#ff9800;color:white;padding:2px 8px;border-radius:15px;font-size:10px;display:inline-block;}
        .status-shipped{background:#2196f3;color:white;padding:2px 8px;border-radius:15px;font-size:10px;display:inline-block;}
        .status-completed{background:#4caf50;color:white;padding:2px 8px;border-radius:15px;font-size:10px;display:inline-block;}
        .status-cancelled{background:#e74c3c;color:white;padding:2px 8px;border-radius:15px;font-size:10px;display:inline-block;}
        
        .update-btn{background:#2e7d32;color:white;border:none;padding:3px 10px;border-radius:15px;cursor:pointer;font-size:10px;}
        .no-orders{text-align:center;padding:30px;color:#999;font-size:13px;}
        .toast{position:fixed;bottom:20px;left:20px;right:20px;background:#1a1a2e;color:white;padding:10px;border-radius:10px;text-align:center;display:none;z-index:1100;font-size:13px;}
        
        /* Notification Badge on icon */
        .notif-badge{position:relative;display:inline-block;}
        .notif-count{position:absolute;top:-6px;right:-10px;background:#e74c3c;color:white;font-size:9px;padding:1px 6px;border-radius:50%;min-width:18px;text-align:center;font-weight:bold;animation:blink 1.5s infinite;}
        
        .order-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
        .order-left{flex:1;min-width:0;}
        .order-right{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
        
        @media (max-width:480px){
            .stats{grid-template-columns:repeat(3,1fr);}
            .order-row{flex-direction:column;align-items:flex-start;}
            .order-right{width:100%;justify-content:space-between;}
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Login -->
    <div id="loginScreen">
        <div class="login-box">
            <div style="font-size:36px;">📦</div>
            <h2>Admin Login</h2>
            <p style="font-size:12px;">Manage orders</p>
            <button class="google-btn" onclick="loginWithGoogle()">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
            </button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardScreen" style="display:none;">
        <div class="header">
            <div style="display:flex;align-items:center;gap:6px;">
                <span style="font-size:16px;">📦</span>
                <h1>Orders</h1>
                <span id="notifBadge" class="notif-badge" style="display:none;">
                    <span class="notif-count" id="notifCount">0</span>
                </span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <span id="userEmail" style="font-size:10px;opacity:0.7;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
                <a href="index.html" class="back-btn" style="font-size:10px;padding:4px 10px;">Store</a>
                <button class="logout-btn" onclick="logout()" style="font-size:10px;padding:4px 10px;">Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats" id="statsContainer">
            <div class="stat-box"><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total</div></div>
            <div class="stat-box"><div class="stat-number" id="pendingOrders">0</div><div class="stat-label">Pending</div></div>
            <div class="stat-box"><div class="stat-number" id="newOrders">0</div><div class="stat-label">New</div></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="filterOrders('all',this)">All</button>
            <button class="tab-btn" onclick="filterOrders('Pending',this)">Pending</button>
            <button class="tab-btn" onclick="filterOrders('Shipped',this)">Shipped</button>
            <button class="tab-btn" onclick="filterOrders('Completed',this)">Completed</button>
            <button class="tab-btn" onclick="filterOrders('Cancelled',this)">Cancelled</button>
        </div>

        <!-- Orders List -->
        <div id="ordersContainer">
            <div class="no-orders">Loading...</div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBUqsrDawGJbX-wgcBFRU4vuaasjt5ZnKQ",
        authDomain: "discountzone-da33a.firebaseapp.com",
        projectId: "discountzone-da33a",
        storageBucket: "discountzone-da33a.firebasestorage.app",
        messagingSenderId: "171693927426",
        appId: "1:171693927426:web:02e912a0a8ce86bfb70b1b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const ADMIN_EMAIL = "abhishekbainsla363@gmail.com";
    let currentFilter = "all";
    let allOrders = [];
    let newOrderCount = 0;
    let lastOrderCount = 0;
    
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }
    
    // ========== LOGIN ==========
    async function loginWithGoogle() {
        try {
            const result = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            if(result.user.email !== ADMIN_EMAIL) {
                await auth.signOut();
                document.getElementById('loginError').innerText = "❌ Unauthorized!";
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            document.getElementById('userEmail').innerText = result.user.email;
            loadOrders();
            // Request notification permission
            if (Notification.permission === "default") {
                Notification.requestPermission();
            }
        } catch(e) {
            document.getElementById('loginError').innerText = "❌ " + e.message;
            document.getElementById('loginError').style.display = 'block';
        }
    }
    
    auth.onAuthStateChanged(user => {
        if(user && user.email === ADMIN_EMAIL) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            document.getElementById('userEmail').innerText = user.email;
            loadOrders();
        }
    });
    
    function logout() {
        auth.signOut();
        document.getElementById('dashboardScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
    }
    
    // ========== FILTER ==========
    function filterOrders(status, btn) {
        currentFilter = status;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        renderOrders();
    }
    
    // ========== NOTIFICATION ==========
    function sendNotification(order) {
        // Browser Notification
        if (Notification.permission === "granted") {
            new Notification("🛒 New Order Received!", {
                body: `Customer: ${order.customerName || order.name}\nTotal: ₹${order.total || 'N/A'}`,
                icon: "https://i.imgur.com/8FkqJpR.jpg"
            });
        }
        // Toast notification on page
        showToast(`🔔 New Order! ${order.customerName || order.name}`);
        // Play sound
        try {
            const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3');
            audio.play();
        } catch(e) {}
    }
    
    // ========== LOAD ORDERS ==========
    function loadOrders() {
        // Listen to orders collection
        db.collection('orders').orderBy('date', 'desc').onSnapshot((snapshot) => {
            let orders = [];
            snapshot.forEach(doc => { 
                let data = doc.data(); 
                data.docId = doc.id; 
                data.isRepair = false;
                orders.push(data); 
            });
            
            // Listen to repairs collection
            db.collection('repairs').orderBy('date', 'desc').onSnapshot((repairSnap) => {
                repairSnap.forEach(doc => { 
                    let data = doc.data(); 
                    data.docId = doc.id; 
                    data.isRepair = true;
                    orders.push(data); 
                });
                
                orders.sort((a,b) => new Date(b.date) - new Date(a.date));
                
                // Check for new orders
                if(allOrders.length > 0 && orders.length > allOrders.length) {
                    // New order detected
                    const newOrder = orders[0];
                    if(newOrder) {
                        sendNotification(newOrder);
                        newOrderCount++;
                        updateBadge();
                    }
                }
                
                allOrders = orders;
                renderOrders();
                updateStats();
            }, (error) => {
                console.log("Repairs error:", error);
            });
        }, (error) => {
            console.log("Orders error:", error);
        });
    }
    
    function updateBadge() {
        const badge = document.getElementById('notifBadge');
        const count = document.getElementById('notifCount');
        if(newOrderCount > 0) {
            badge.style.display = 'inline-block';
            count.innerText = newOrderCount;
        } else {
            badge.style.display = 'none';
        }
    }
    
    function updateStats() {
        const total = allOrders.length;
        const pending = allOrders.filter(o => o.status === 'Pending').length;
        document.getElementById('totalOrders').innerText = total;
        document.getElementById('pendingOrders').innerText = pending;
        document.getElementById('newOrders').innerText = allOrders.filter(o => o.status === 'Pending' || o.status === 'Shipped').length;
    }
    
    function renderOrders() {
        const container = document.getElementById('ordersContainer');
        let filtered = allOrders;
        if(currentFilter !== 'all') {
            filtered = filtered.filter(o => o.status === currentFilter);
        }
        
        if(filtered.length === 0) {
            container.innerHTML = '<div class="no-orders">📭 No orders</div>';
            return;
        }
        
        let html = '';
        filtered.slice(0, 30).forEach(o => {
            const statusClass = o.status === 'Pending' ? 'status-pending' : 
                               o.status === 'Shipped' ? 'status-shipped' : 
                               o.status === 'Completed' ? 'status-completed' : 'status-cancelled';
            
            const items = o.items ? o.items.replace(/\n/g, '<br>') : (o.deviceFaults || '');
            const customer = o.customerName || o.name || 'Unknown';
            const phone = o.customerPhone || o.phone || '';
            const total = o.total || 'N/A';
            const isRepair = o.isRepair || false;
            
            html += `
                <div class="card">
                    <div class="order-row">
                        <div class="order-left">
                            <div class="order-header">
                                <span class="order-id">${isRepair ? '🔧' : '🛒'} ${o.orderId || o.repairId || 'Order'}</span>
                                <span class="order-date">${new Date(o.date).toLocaleString()}</span>
                            </div>
                            <div class="order-customer">👤 ${customer} ${phone ? '📞 '+phone : ''}</div>
                            ${o.customerAddress ? `<div style="font-size:10px;color:#666;">📍 ${o.customerAddress}</div>` : ''}
                            ${isRepair ? `<div style="font-size:11px;color:#555;"><strong>Device:</strong> ${o.deviceType || ''} ${o.deviceBrand || ''} ${o.deviceModel || ''}</div>` : ''}
                            <div class="order-items">${items}</div>
                        </div>
                        <div class="order-right">
                            <span class="order-total">${isRepair ? '🔧 Repair' : '₹'+total}</span>
                            <span class="${statusClass}">${o.status || 'Pending'}</span>
                            <select class="status-select" id="status-${o.docId}">
                                <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                                <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                                <option value="Completed" ${o.status==='Completed'?'selected':''}>Completed</option>
                                <option value="Cancelled" ${o.status==='Cancelled'?'selected':''}>Cancelled</option>
                            </select>
                            <button class="update-btn" onclick="updateStatus('${o.docId}')">Update</button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    // ========== UPDATE STATUS ==========
    async function updateStatus(docId) {
        const newStatus = document.getElementById(`status-${docId}`).value;
        try {
            const orderDoc = await db.collection('orders').doc(docId).get();
            if(orderDoc.exists) {
                await db.collection('orders').doc(docId).update({ status: newStatus });
            } else {
                await db.collection('repairs').doc(docId).update({ status: newStatus });
            }
            showToast("✅ Status updated to " + newStatus);
            // If we update status, reset notification badge for that order type
            newOrderCount = Math.max(0, newOrderCount - 1);
            updateBadge();
        } catch(e) {
            showToast("❌ Error: " + e.message);
        }
    }
    
    // Reset notification badge when user clicks on it
    document.addEventListener('click', function() {
        newOrderCount = 0;
        updateBadge();
    });
</script>
</body>
</html>
