<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin - Orders</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Roboto,sans-serif;background:#f0f4f0;color:#1a1a1a;padding:20px;}
        
        .header{background:#2e7d32;padding:15px 20px;border-radius:16px;margin-bottom:25px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;color:white;}
        .header h1{font-size:20px;}
        .logout-btn{background:#ff6b35;color:white;border:none;padding:8px 18px;border-radius:25px;cursor:pointer;font-weight:bold;}
        .back-btn{background:white;color:#2e7d32;border:none;padding:8px 18px;border-radius:25px;cursor:pointer;font-weight:bold;text-decoration:none;}
        
        .login-box{max-width:380px;margin:80px auto;background:white;border-radius:20px;padding:35px 25px;text-align:center;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
        .login-box h2{color:#2e7d32;margin-bottom:8px;}
        .login-box p{color:#666;font-size:14px;margin-bottom:20px;}
        .google-btn{background:white;border:1px solid #ddd;padding:12px;border-radius:50px;width:100%;cursor:pointer;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;}
        .google-btn:hover{background:#f5f5f5;}
        .login-error{color:#e74c3c;margin-top:10px;display:none;font-size:13px;}
        
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px;}
        .stat-box{background:white;border-radius:12px;padding:15px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
        .stat-number{font-size:28px;font-weight:bold;color:#2e7d32;}
        .stat-label{font-size:12px;color:#666;}
        
        .card{background:white;border-radius:16px;padding:15px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
        .order-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
        .order-id{font-weight:bold;font-size:14px;}
        .order-date{font-size:12px;color:#999;}
        .order-customer{font-size:14px;margin-bottom:4px;}
        .order-items{font-size:13px;color:#555;margin:8px 0;padding:8px;background:#f8f9fa;border-radius:8px;}
        .order-total{font-weight:bold;color:#2e7d32;font-size:16px;}
        
        .status-select{padding:6px 12px;border-radius:20px;border:1px solid #ddd;font-size:12px;cursor:pointer;}
        .status-pending{background:#ff9800;color:white;padding:4px 10px;border-radius:20px;font-size:11px;display:inline-block;}
        .status-shipped{background:#2196f3;color:white;padding:4px 10px;border-radius:20px;font-size:11px;display:inline-block;}
        .status-completed{background:#4caf50;color:white;padding:4px 10px;border-radius:20px;font-size:11px;display:inline-block;}
        .status-cancelled{background:#e74c3c;color:white;padding:4px 10px;border-radius:20px;font-size:11px;display:inline-block;}
        
        .update-btn{background:#2e7d32;color:white;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:11px;}
        .update-btn:hover{background:#1b5e20;}
        
        .no-orders{text-align:center;padding:40px;color:#999;}
        .toast{position:fixed;bottom:20px;left:20px;right:20px;background:#1a1a2e;color:white;padding:12px;border-radius:10px;text-align:center;display:none;z-index:1100;}
        
        .tabs{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap;}
        .tab-btn{background:#f0f4f0;border:2px solid #2e7d32;padding:6px 16px;border-radius:30px;cursor:pointer;font-weight:bold;font-size:13px;}
        .tab-btn.active{background:#2e7d32;color:white;}
        
        @media (max-width:600px){.order-header{flex-direction:column;align-items:flex-start;}}
    </style>
</head>
<body>

<div id="app">
    <!-- Login -->
    <div id="loginScreen">
        <div class="login-box">
            <div style="font-size:40px;">📦</div>
            <h2>Admin Panel</h2>
            <p>Manage orders</p>
            <button class="google-btn" onclick="loginWithGoogle()">
                <svg width="22" height="22" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
            </button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardScreen" style="display:none;">
        <div class="header">
            <div><h1>📦 Orders</h1></div>
            <div>
                <span id="userEmail" style="font-size:12px;opacity:0.8;margin-right:10px;"></span>
                <a href="index.html" class="back-btn">Store</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats" id="statsContainer"></div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="filterOrders('all')">All</button>
            <button class="tab-btn" onclick="filterOrders('Pending')">Pending</button>
            <button class="tab-btn" onclick="filterOrders('Shipped')">Shipped</button>
            <button class="tab-btn" onclick="filterOrders('Completed')">Completed</button>
            <button class="tab-btn" onclick="filterOrders('Cancelled')">Cancelled</button>
        </div>

        <!-- Orders List -->
        <div id="ordersContainer"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBUqsrDawGJbX-wgcBFRU4vuaasjt5ZnKQ",
        authDomain: "discountzone-da33a.firebaseapp.com",
        projectId: "discountzone-da33a",
        storageBucket: "discountzone-da33a.firebasestorage.app",
        messagingSenderId: "171693927426",
        appId: "1:171693927426:web:02e912a0a8ce86bfb70b1b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const ADMIN_EMAIL = "abhishekbainsla363@gmail.com";
    let currentFilter = "all";
    
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }
    
    // ========== LOGIN ==========
    async function loginWithGoogle() {
        try {
            const result = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            if(result.user.email !== ADMIN_EMAIL) {
                await auth.signOut();
                document.getElementById('loginError').innerText = "❌ Unauthorized! Only admin can access.";
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            document.getElementById('userEmail').innerText = result.user.email;
            loadOrders();
        } catch(e) {
            document.getElementById('loginError').innerText = "❌ " + e.message;
            document.getElementById('loginError').style.display = 'block';
        }
    }
    
    auth.onAuthStateChanged(user => {
        if(user && user.email === ADMIN_EMAIL) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'flex';
            document.getElementById('userEmail').innerText = user.email;
            loadOrders();
        }
    });
    
    function logout() {
        auth.signOut();
        document.getElementById('dashboardScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
    }
    
    // ========== FILTER ==========
    function filterOrders(status) {
        currentFilter = status;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        loadOrders();
    }
    
    // ========== LOAD ORDERS ==========
    async function loadOrders() {
        const container = document.getElementById('ordersContainer');
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">Loading...</div>';
        
        try {
            // Get all orders
            const snapshot = await db.collection('orders').orderBy('date', 'desc').get();
            let orders = [];
            snapshot.forEach(doc => { 
                let data = doc.data(); 
                data.docId = doc.id; 
                orders.push(data); 
            });
            
            // Also get repairs
            const repairSnap = await db.collection('repairs').orderBy('date', 'desc').get();
            repairSnap.forEach(doc => { 
                let data = doc.data(); 
                data.docId = doc.id; 
                data.isRepair = true; 
                orders.push(data); 
            });
            
            // Sort by date
            orders.sort((a,b) => new Date(b.date) - new Date(a.date));
            
            // Filter
            if(currentFilter !== 'all') {
                orders = orders.filter(o => o.status === currentFilter);
            }
            
            // Stats
            const allOrders = snapshot.size + repairSnap.size;
            const pending = orders.filter(o => o.status === 'Pending').length;
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-box"><div class="stat-number">${allOrders}</div><div class="stat-label">Total Orders</div></div>
                <div class="stat-box"><div class="stat-number">${pending}</div><div class="stat-label">Pending</div></div>
                <div class="stat-box"><div class="stat-number">${orders.filter(o => o.status === 'Shipped').length}</div><div class="stat-label">Shipped</div></div>
                <div class="stat-box"><div class="stat-number">${orders.filter(o => o.status === 'Completed').length}</div><div class="stat-label">Completed</div></div>
                <div class="stat-box"><div class="stat-number">${orders.filter(o => o.status === 'Cancelled').length}</div><div class="stat-label">Cancelled</div></div>
            `;
            
            if(orders.length === 0) {
                container.innerHTML = '<div class="no-orders">📭 No orders found</div>';
                return;
            }
            
            let html = '';
            orders.forEach(o => {
                const statusClass = o.status === 'Pending' ? 'status-pending' : 
                                   o.status === 'Shipped' ? 'status-shipped' : 
                                   o.status === 'Completed' ? 'status-completed' : 'status-cancelled';
                
                const items = o.items ? o.items.replace(/\n/g, '<br>') : (o.deviceFaults || 'No items');
                const customer = o.customerName || o.name || 'Unknown';
                const phone = o.customerPhone || o.phone || '';
                const total = o.total || 'N/A';
                const isRepair = o.isRepair || false;
                
                html += `
                    <div class="card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">${isRepair ? '🔧 ' : '🛒 '}${o.orderId || o.repairId || 'Order'}</span>
                                <span class="order-date">${new Date(o.date).toLocaleString()}</span>
                            </div>
                            <div>
                                <span class="${statusClass}">${o.status || 'Pending'}</span>
                            </div>
                        </div>
                        <div class="order-customer">👤 ${customer} ${phone ? '📞 '+phone : ''}</div>
                        ${o.customerAddress ? `<div style="font-size:12px;color:#666;">📍 ${o.customerAddress}</div>` : ''}
                        ${isRepair ? `<div style="font-size:13px;color:#555;"><strong>Device:</strong> ${o.deviceType || ''} - ${o.deviceBrand || ''} ${o.deviceModel || ''}</div>` : ''}
                        <div class="order-items">${items}</div>
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                            <span class="order-total">${isRepair ? '💰 Repair' : '💰 ₹'+total}</span>
                            <div style="display:flex;gap:6px;align-items:center;">
                                <select class="status-select" id="status-${o.docId}">
                                    <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                                    <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                                    <option value="Completed" ${o.status==='Completed'?'selected':''}>Completed</option>
                                    <option value="Cancelled" ${o.status==='Cancelled'?'selected':''}>Cancelled</option>
                                </select>
                                <button class="update-btn" onclick="updateStatus('${o.docId}')">Update</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            
        } catch(e) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#e74c3c;">Error loading orders</div>';
            console.log(e);
        }
    }
    
    // ========== UPDATE STATUS ==========
    async function updateStatus(docId) {
        const newStatus = document.getElementById(`status-${docId}`).value;
        try {
            // Check if it's in orders or repairs
            const orderDoc = await db.collection('orders').doc(docId).get();
            if(orderDoc.exists) {
                await db.collection('orders').doc(docId).update({ status: newStatus });
            } else {
                await db.collection('repairs').doc(docId).update({ status: newStatus });
            }
            showToast("✅ Status updated to " + newStatus);
            loadOrders();
        } catch(e) {
            showToast("❌ Error: " + e.message);
        }
    }
</script>
</body>
</html>
